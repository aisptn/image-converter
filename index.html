<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image converter</title>
    <link rel="stylesheet" href="https://aisptn.github.io/reset.css/reset.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: black;
            position: sticky;
            top: 0;
        }
        nav {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        nav ul {
            display: flex;
        }
        nav ul li {
            list-style: none;
        }
        main {
            padding: 1rem;
            height: 100%;
        }
        section {
            align-items: center;
            display: flex;
            height: 100%;
            max-height: auto;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1rem;
        }
        section h1 {
            color: gray;
            text-align: center;
        }
        figure {
            border: 1px dashed white;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 256px;
            margin: 1rem;
            padding: 1rem;
            width: 180px;
        }
        figure img {
            flex: 1;
            max-height: 100%;
            max-width: 100%;
            min-height: 0;
            object-fit: contain;
        }
        figcaption {
            margin-top: auto;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
        }
        .drop-hover {
            border: 0.5rem dashed gray;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><button id="open">open</button></li>
                <li><button id="save" disabled>save</button></li>
                <li><button id="clear" disabled>clear</button></li>
            </ul>
            <ul>
                <li><button id="format" title="use mouse button or scroll wheel to change">format: </button></li>
                <li><button id="quality" title="use mouse button or scroll wheel to change">quality: </button></li>
                <li><button id="bg-color">bg color: </button></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>drag and drop images here or click [open] to get started</h1>
        </section>
    </main>

    <script>
        const body = document.body;
        const openButton = document.getElementById('open');
        const saveButton = document.getElementById('save');
        const clearButton = document.getElementById('clear');
        const formatButton = document.getElementById('format');
        const qualityButton = document.getElementById('quality');
        const bgColorButton = document.getElementById('bg-color');
        const section = document.querySelector('section');
        const description = section.querySelector('h1');
        const openFormats = ['avif', 'bmp', 'gif', 'ico', 'jpeg', 'png', 'svg+xml', 'tiff', 'webp'];
        const saveFormats = ['jpeg', 'png', 'webp'];

        function handleFiles(files) {
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const figure = document.createElement('figure');
                    const img = document.createElement('img');
                    const figcaption = document.createElement('figcaption');
                    img.src = e.target.result;
                    figure.appendChild(img);
                    section.appendChild(figure);
                    figcaption.textContent = file.name;
                    figure.appendChild(figcaption);
                };
                reader.readAsDataURL(file);
            }
            description.style.display = 'none';
            saveButton.disabled = false;
            clearButton.disabled = false;
        }

        function showDropHover() {
            section.classList.add('drop-hover');
        }

        function hideDropHover() {
            section.classList.remove('drop-hover');
        }

        section.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        section.addEventListener('dragenter', (e) => {
            e.preventDefault();
            showDropHover();
        });

        section.addEventListener('dragleave', (e) => {
            e.preventDefault();
            hideDropHover();
        });

        section.addEventListener('drop', (e) => {
            e.preventDefault();
            hideDropHover();
            handleFiles(e.dataTransfer.files);
        });

        openButton.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/avif,image/bmp,image/gif,image/ico,image/jpeg,image/png,image/svg+xml,image/tiff,image/webp';
            input.multiple = true;
            input.click();
            input.addEventListener('change', () => {
                handleFiles(input.files);
            });
        });


        [formatButton, qualityButton].forEach(button => {
            button.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });
        });
        

        let currentFormatIndex = 0;
        const updateQualityButtonState = () => {
            qualityButton.disabled = saveFormats[currentFormatIndex] === 'png';
            qualityButton.textContent = `quality: ${saveFormats[currentFormatIndex] === 'png' ? 1.0 : quality.toFixed(1)}`;
        };
        
        formatButton.textContent = `format: ${saveFormats[currentFormatIndex]}`;

        formatButton.addEventListener('click', () => {
            currentFormatIndex = (currentFormatIndex + 1) % saveFormats.length;
            formatButton.textContent = `format: ${saveFormats[currentFormatIndex]}`;
            updateQualityButtonState();
            updateBgColorButtonState();
        });
        
        formatButton.addEventListener('auxclick', (e) => {
            currentFormatIndex = (currentFormatIndex - 1 + saveFormats.length) % saveFormats.length;
            formatButton.textContent = `format: ${saveFormats[currentFormatIndex]}`;
            updateQualityButtonState();
            updateBgColorButtonState();
        });

        let quality = 0.9;
        qualityButton.textContent = `quality: ${quality.toFixed(1)}`;
        qualityButton.addEventListener('click', () => {
            quality = Math.min(1, quality + 0.1);
            qualityButton.textContent = `quality: ${quality.toFixed(1)}`;
        });

        qualityButton.addEventListener('auxclick', (e) => {
            quality = Math.max(0, quality - 0.1);
            qualityButton.textContent = `quality: ${quality.toFixed(1)}`;
        });
        
        qualityButton.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                quality = Math.min(1, quality + 0.1);
            } else {
                quality = Math.max(0, quality - 0.1);
            }
            qualityButton.textContent = `quality: ${quality.toFixed(1)}`;
        });

        formatButton.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                currentFormatIndex = (currentFormatIndex + 1) % saveFormats.length;
            } else {
                currentFormatIndex = (currentFormatIndex - 1 + saveFormats.length) % saveFormats.length;
            }
            formatButton.textContent = `format: ${saveFormats[currentFormatIndex]}`;
            updateQualityButtonState();
            updateBgColorButtonState();
        });

        saveButton.addEventListener('click', () => {
            const figures = document.querySelectorAll('figure');
            figures.forEach(figure => {
                const img = figure.querySelector('img');
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                canvas.toBlob(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${figure.querySelector('figcaption').textContent.split('.').slice(0, -1).join('.')}.${saveFormats[currentFormatIndex]}`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }, `image/${saveFormats[currentFormatIndex]}`, quality);
            });
        });

        const updateBgColorButtonState = () => {
            bgColorButton.disabled = saveFormats[currentFormatIndex] !== 'jpeg';
        };

        let bgColor = '#ffffff';
        bgColorButton.textContent = `bg color: ${bgColor}`;
        bgColorButton.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'color';
            input.value = bgColor;
            input.click();
            input.addEventListener('change', () => {
                bgColor = input.value;
                bgColorButton.textContent = `bg color: ${bgColor}`;
                const figures = document.querySelectorAll('figure');
                figures.forEach(figure => {
                    const img = figure.querySelector('img');
                    img.style.backgroundColor = bgColor;
                });
            });
        });

        clearButton.addEventListener('click', () => {
            const section = document.querySelector('section');
            if (section.children.length > 0) {
                if (confirm('Clear all images?')) {
                    while (section.firstChild) {
                        section.removeChild(section.firstChild);
                    }
                    description.style.display = 'block';
                    saveButton.disabled = true;
                    clearButton.disabled = true;
                }
            }
        });
    </script>
</body>
</html>
